<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imperial Command Center</title>
    <style>
        body { background-color: #000; color: #ffcc00; font-family: 'Courier New', monospace; text-align: center; padding: 50px; }
        .box { border: 2px solid #ffcc00; padding: 20px; border-radius: 15px; display: inline-block; }
        h1 { text-shadow: 2px 2px #555; }
        .progress-bar { width: 300px; height: 20px; border: 1px solid #ffcc00; margin: 20px auto; border-radius: 10px; overflow: hidden; }
        .progress-fill { width: 0.1472%; height: 100%; background-color: #ffcc00; }
        button { background-color: #ffcc00; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>PIYUSH SAMRAT: MISSION 2027</h1>
        <p>SYSTEM STATUS: <span style="color: #00ff00;">OPERATIONAL</span></p>
        <p>TARGET: ₹10,000 CR | CURRENT: ₹14.72 CR</p>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <p>0.1472% ACHIEVED</p>
        <hr>
        <h3>EMPIRE STRATEGY JOURNAL</h3>
        <textarea id="log" placeholder="Enter today's victory..." style="width: 100%; height: 100px; background: #111; color: #fff; border: 1px solid #ffcc00;"></textarea><br><br>
        <button onclick="alert('Victory Logged!')">LOG VICTORY</button>
    </div>
</body>
</html>
